<!DOCTYPE html>
<!--
  AASPT Journal Club — Slide Generator
  ══════════════════════════════════════
  GitHub Pages deployment:
  1. Create a new GitHub repository (e.g. "aaspt-journal-club")
  2. Upload this file as index.html to the root
  3. Go to Settings → Pages → Source: Deploy from branch → main / root
  4. Your generator will be live at https://[username].github.io/[repo-name]

  Export instructions:
  - Fill in all form fields on the left
  - Preview updates live on the right
  - Toggle Light / Dark slide theme using the button in the top bar
  - Click "Export Slide" to download the current slide as a 1080×1350 PNG
  - Click "Export All" to download all 5 slides as a ZIP file
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AASPT Journal Club — Slide Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Lora:ital,wght@1,400;1,600&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
/* ══════════════════════════════════════════════════════
   RESET + BASE
   ══════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Barlow',sans-serif;background:#E4E3EB;color:#1A1A2E;overflow:hidden;}

/* ══════════════════════════════════════════════════════
   TOP NAV BAR
   ══════════════════════════════════════════════════════ */
.top-nav{
  height:52px;background:#005F87;display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,0.25);position:relative;z-index:100;
}
.nav-brand{display:flex;align-items:center;gap:12px;}
.nav-logo-text{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:0.05em;}
.nav-sep{width:1px;height:24px;background:rgba(255,255,255,0.2);}
.nav-title{font-size:12px;color:rgba(255,255,255,0.6);letter-spacing:0.08em;text-transform:uppercase;}
.nav-controls{display:flex;align-items:center;gap:8px;}

/* Theme toggle */
.theme-toggle{
  display:flex;align-items:center;gap:0;
  background:rgba(0,0,0,0.25);border-radius:5px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
}
.theme-btn{
  padding:5px 12px;font-size:10px;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;border:none;cursor:pointer;transition:all .18s;
  font-family:'Barlow',sans-serif;color:rgba(255,255,255,0.5);background:transparent;
}
.theme-btn.active{background:#fff;color:#005F87;}
.theme-btn:first-child{border-right:1px solid rgba(255,255,255,0.1);}

/* Nav export buttons */
.nav-export-btn{
  padding:6px 14px;border-radius:4px;font-size:10px;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;border:none;cursor:pointer;
  font-family:'Barlow',sans-serif;transition:all .15s;
}
.btn-export-one{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.25);}
.btn-export-one:hover{background:rgba(255,255,255,0.25);}
.btn-export-all{background:#fff;color:#005F87;}
.btn-export-all:hover{background:#E8F4FA;}
.btn-exporting{opacity:0.6;cursor:not-allowed;}

/* ══════════════════════════════════════════════════════
   APP LAYOUT
   ══════════════════════════════════════════════════════ */
.app{display:flex;height:calc(100vh - 52px);}

/* ══════════════════════════════════════════════════════
   SIDEBAR
   ══════════════════════════════════════════════════════ */
.sidebar{
  width:380px;flex-shrink:0;background:#fff;
  border-right:1px solid #DDDBE6;display:flex;flex-direction:column;overflow:hidden;
}
.sb-head{background:#004E72;padding:12px 18px 10px;flex-shrink:0;}
.sb-head-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:0.04em;}
.sb-head-sub{font-size:9px;color:rgba(255,255,255,0.45);margin-top:2px;letter-spacing:0.06em;}

/* Sidebar article tabs */
.sb-tabs{display:flex;border-bottom:1px solid #ECEAEF;flex-shrink:0;background:#F8F8FB;}
.sb-tab{
  flex:1;padding:8px 4px;font-size:9.5px;font-weight:600;text-align:center;
  cursor:pointer;color:#8A8FA0;border:none;background:transparent;
  letter-spacing:0.06em;text-transform:uppercase;border-bottom:2px solid transparent;
  transition:all .15s;font-family:'Barlow',sans-serif;
}
.sb-tab:hover{color:#005F87;}
.sb-tab.active{color:#005F87;border-bottom-color:#005F87;background:#fff;}

.form-scroll{flex:1;overflow-y:auto;padding:14px 16px 0;}

/* Form elements */
.f-sec{margin-bottom:16px;}
.f-sec-lbl{font-size:8.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;border-bottom:1px solid #EEEDF2;padding-bottom:5px;margin-bottom:10px;}
.f-row{margin-bottom:6px;}
.f-lbl{font-size:9.5px;color:#565A5C;font-weight:600;margin-bottom:2px;display:block;}
.f-inp{
  width:100%;border:1px solid #D8D5D0;border-radius:4px;
  padding:5px 8px;font-size:11px;font-family:'Barlow',sans-serif;
  color:#1A1A1A;background:#FAFAFA;line-height:1.35;transition:border .15s;
}
.f-inp:focus{outline:none;border-color:#005F87;background:#fff;}
textarea.f-inp{resize:vertical;min-height:36px;}
.f-sel{
  width:100%;border:1px solid #D8D5D0;border-radius:4px;
  padding:5px 8px;font-size:11px;font-family:'Barlow',sans-serif;
  color:#1A1A1A;background:#FAFAFA;cursor:pointer;
}
.f-sel:focus{outline:none;border-color:#005F87;}
.f-2col{display:flex;gap:6px;}
.f-2col .f-row{flex:1;margin-bottom:0;}

/* Pearl form rows */
.p-block{border:1px solid #EEEDF2;border-radius:5px;padding:8px 10px;margin-bottom:6px;background:#FAFAFA;}
.p-num{font-size:7.5px;font-weight:700;color:#B0AEC0;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px;}
.p-top{display:flex;gap:5px;margin-bottom:4px;}
.p-cat-sel{
  width:95px;flex-shrink:0;border:1px solid #D8D5D0;border-radius:3px;
  padding:3px 5px;font-size:9px;font-family:'Barlow',sans-serif;
  color:#1A1A1A;background:#fff;cursor:pointer;
}
.p-cat-sel.c-assess   {border-color:#3B82F6;color:#1D4ED8;}
.p-cat-sel.c-intervene{border-color:#B45309;color:#92400E;}
.p-cat-sel.c-outcome  {border-color:#059669;color:#065F46;}
.p-anchor{
  flex:1;border:1px solid #D8D5D0;border-radius:3px;
  padding:3px 7px;font-size:10.5px;font-family:'Barlow',sans-serif;
  font-weight:600;background:#fff;
}
.p-anchor:focus{outline:none;border-color:#005F87;}
.p-body{
  width:100%;border:1px solid #D8D5D0;border-radius:3px;
  padding:3px 7px;font-size:10.5px;font-family:'Barlow',sans-serif;
  background:#fff;resize:vertical;min-height:30px;line-height:1.3;
}
.p-body:focus{outline:none;border-color:#005F87;}

/* Export bar */
.exp-bar{
  display:flex;gap:5px;padding:9px 14px;
  border-top:1px solid #ECEAEF;background:#F8F8FB;
  flex-shrink:0;flex-wrap:wrap;align-items:center;
}
.exp-bar-label{font-size:8.5px;color:#8A8FA0;text-transform:uppercase;letter-spacing:0.1em;margin-right:3px;}
.sb-nav-btn{
  border:none;border-radius:3px;padding:5px 10px;font-size:9px;
  font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;
  letter-spacing:0.05em;background:#E5F0F8;color:#005F87;transition:all .15s;
}
.sb-nav-btn:hover{background:#CCDEF0;}
.sb-nav-btn.active-slide{background:#005F87;color:#fff;}

/* ══════════════════════════════════════════════════════
   PREVIEW AREA
   ══════════════════════════════════════════════════════ */
.preview-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#1A1A2E;min-width:0;}
.preview-tabs{
  display:flex;border-bottom:1px solid rgba(255,255,255,0.08);
  background:#13132A;flex-shrink:0;padding:0 16px;
}
.ptab{
  padding:9px 14px;font-size:9.5px;font-weight:600;cursor:pointer;
  color:#555;border:none;background:transparent;
  letter-spacing:0.06em;text-transform:uppercase;
  border-bottom:2px solid transparent;transition:all .15s;font-family:'Barlow',sans-serif;
}
.ptab:hover{color:#888;}
.ptab.active{color:#fff;border-bottom-color:#fff;}
.preview-canvas{flex:1;overflow:auto;display:flex;justify-content:center;padding:24px;}
.slide-wrap{transform-origin:top center;display:inline-block;line-height:0;}

/* Exporting overlay */
.exporting-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;
  align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.exporting-overlay.show{display:flex;}
.exporting-spinner{
  width:40px;height:40px;border:3px solid rgba(255,255,255,0.2);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;
}
.exporting-text{color:#fff;font-size:13px;letter-spacing:0.08em;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ══════════════════════════════════════════════════════
   HIDDEN EXPORT ZONE  (off-screen, real size)
   ══════════════════════════════════════════════════════ */
#export-zone{
  position:fixed;left:-2200px;top:0;width:1080px;
  pointer-events:none;z-index:-1;
}

/* ══════════════════════════════════════════════════════
   SLIDE BASE  (all themes share this structure)
   ══════════════════════════════════════════════════════ */
.slide{width:1080px;height:1350px;position:relative;overflow:hidden;font-family:'Barlow',sans-serif;display:flex;flex-direction:column;}

/* Accent top bar */
.s-accent{position:absolute;top:0;left:0;right:0;height:5px;z-index:10;}
/* Texture overlay div */
.s-texture{position:absolute;inset:0;background-image:radial-gradient(currentColor 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:1;}
/* Glow div */
.s-glow{position:absolute;right:-100px;top:150px;width:520px;height:520px;border-radius:50%;pointer-events:none;z-index:1;}
/* Decorative bg numeral */
.s-bgnum{position:absolute;right:20px;top:55px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:390px;line-height:1;z-index:2;user-select:none;letter-spacing:-0.05em;pointer-events:none;}
/* Content */
.s-body{position:relative;z-index:5;padding:50px 70px 42px;height:100%;display:flex;flex-direction:column;}
/* Header */
.s-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.s-logo-wrap{display:flex;align-items:center;gap:10px;}
.s-logo-icon{width:40px;height:40px;}
.s-logo-aaspt{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:19px;letter-spacing:0.05em;line-height:1;}
.s-logo-tag{font-size:7.5px;letter-spacing:0.09em;text-transform:uppercase;font-weight:500;margin-top:3px;}
.s-hdr-jc{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.1em;line-height:1.8;}
.s-hdr-ep{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.08em;}
/* Category label */
.s-cat{font-family:'Space Mono',monospace;font-size:8.5px;text-transform:uppercase;letter-spacing:0.16em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.s-cat-left{display:flex;align-items:center;gap:9px;}
.s-cat-rule{display:block;width:20px;height:2px;border-radius:2px;flex-shrink:0;}
.s-study-badge{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
/* Article title */
.s-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:46px;line-height:1.07;letter-spacing:-0.01em;margin-bottom:18px;position:relative;z-index:3;}
/* Reviewer strip */
.s-rvstrip{display:flex;gap:24px;padding:12px 16px;border-radius:5px;margin-bottom:20px;}
.s-rvblock{display:flex;flex-direction:column;gap:2px;}
.s-rv-role{font-family:'Space Mono',monospace;font-size:7.5px;text-transform:uppercase;letter-spacing:0.12em;}
.s-rv-name{font-size:14px;font-weight:600;line-height:1.2;}
.s-rv-creds{font-size:10.5px;}
.s-rvdiv{width:1px;align-self:stretch;}
/* Section label */
.s-sec-lbl{font-family:'Space Mono',monospace;font-size:7.5px;text-transform:uppercase;letter-spacing:0.18em;margin-bottom:7px;display:flex;align-items:center;gap:9px;}
.s-sec-lbl::after{content:'';flex:1;height:1px;}
/* Bottom line */
.s-bl-wrap{margin-bottom:18px;}
.s-bl-text{font-size:15.5px;font-weight:500;line-height:1.55;padding-left:15px;border-left:3px solid;font-style:italic;}
/* Pearls */
.s-pearls{flex:1;display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.s-pearl{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;border-radius:5px;}
.s-badge{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:0.09em;text-transform:uppercase;padding:3px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:2px;border:1px solid;}
.s-pearl-text{font-size:12.5px;line-height:1.52;}
.s-pearl-text strong{font-weight:600;}
/* Footer */
.s-footer{padding-top:12px;display:flex;flex-direction:column;gap:5px;}
.s-cite{font-family:'Space Mono',monospace;font-size:7.5px;font-style:italic;line-height:1.6;}
.s-foot-row{display:flex;justify-content:space-between;align-items:center;}
.s-tags{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:0.04em;}
.s-handle{font-family:'Space Mono',monospace;font-size:7.5px;}
/* Cover */
.s-cover-eyebrow{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:14px;}
.s-cover-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:106px;line-height:0.91;letter-spacing:-0.02em;text-transform:uppercase;margin-bottom:5px;}
.s-cover-sub{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:44px;letter-spacing:0.03em;text-transform:uppercase;margin-bottom:24px;}
.s-cover-meta{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.1em;}
.s-art-cards{display:flex;flex-direction:column;gap:8px;margin-top:26px;}
.s-art-card{display:flex;align-items:center;gap:14px;padding:13px 17px;border-radius:5px;border-left:3px solid;}
.s-card-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px;opacity:0.2;min-width:30px;line-height:1;}
.s-card-title{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:2px;}
.s-card-rv{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:0.04em;}
.s-exp-banner{margin-top:20px;padding:15px 18px;border-radius:5px;}
.s-eb-lbl{font-family:'Space Mono',monospace;font-size:7.5px;text-transform:uppercase;letter-spacing:0.16em;margin-bottom:5px;}
.s-eb-name{font-size:15px;font-weight:700;}
.s-eb-creds{font-size:11px;margin-top:1px;}
/* Contact */
.s-contact-head{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:56px;text-transform:uppercase;letter-spacing:-0.01em;line-height:1;margin-bottom:4px;}
.s-contact-sub{font-size:12px;margin-bottom:22px;}
.s-rc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.s-rc-card{padding:14px 16px;border-radius:5px;border-top:2px solid;}
.s-rc-tag{font-family:'Space Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:0.14em;margin-bottom:3px;}
.s-rc-name{font-size:13.5px;font-weight:700;}
.s-rc-creds{font-size:10px;margin-bottom:8px;}
.s-rc-contacts{display:flex;flex-direction:column;gap:4px;}
.s-rc-row{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:8.5px;}
/* Citations block on contact slide */
.s-citations-block{border-radius:5px;padding:14px 16px;margin-bottom:14px;}
.s-cit-label{font-family:'Space Mono',monospace;font-size:7.5px;text-transform:uppercase;letter-spacing:0.16em;margin-bottom:10px;}
.s-cit-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:7px;}
.s-cit-item:last-child{margin-bottom:0;}
.s-cit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.s-cit-text{font-family:'Space Mono',monospace;font-size:7.5px;line-height:1.55;font-style:italic;}
/* Announcement */
.s-ann-box{border-radius:5px;padding:16px 20px;margin-bottom:16px;}
.s-ann-tag{font-family:'Space Mono',monospace;font-size:7.5px;text-transform:uppercase;letter-spacing:0.16em;margin-bottom:8px;}
.s-ann-when{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:3px;}
.s-ann-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;line-height:1.1;}
.s-ann-note{font-family:'Space Mono',monospace;font-size:8.5px;margin-top:8px;}
</style>
</head>
<body>

<!-- ── TOP NAV ── -->
<nav class="top-nav">
  <div class="nav-brand">
    <svg width="32" height="32" viewBox="0 0 44 44" fill="none">
      <path d="M7 36L22 9L37 36Z" fill="none" stroke="#fff" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M15 36L25 18L37 36Z" fill="#fff" opacity="0.3"/>
      <circle cx="31" cy="11" r="2.8" fill="#fff"/>
      <path d="M29.5 14L27 21M29.5 14L33 19.5M27 21L24.5 26.5M27 21L30 26" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    <div class="nav-sep"></div>
    <span class="nav-logo-text">AASPT</span>
    <div class="nav-sep"></div>
    <span class="nav-title">Journal Club · Slide Generator</span>
  </div>
  <div class="nav-controls">
    <div class="theme-toggle">
      <button class="theme-btn" id="btn-light" onclick="setTheme('light')">☀ Light</button>
      <button class="theme-btn active" id="btn-dark"  onclick="setTheme('dark')">🌙 Dark</button>
    </div>
    <button class="nav-export-btn btn-export-one" id="btn-export-one" onclick="exportCurrent()">⬇ Export Slide</button>
    <button class="nav-export-btn btn-export-all" id="btn-export-all" onclick="exportAll()">⬇ Export All (ZIP)</button>
  </div>
</nav>

<!-- ── APP BODY ── -->
<div class="app">

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-head-title">Journal Club Form</div>
      <div class="sb-head-sub">Fill in once per episode — preview updates live</div>
    </div>
    <div class="sb-tabs">
      <button class="sb-tab active" onclick="switchSbTab('global',this)">Global</button>
      <button class="sb-tab" style="color:#00B4A0" onclick="switchSbTab('art0',this)">Art. 1</button>
      <button class="sb-tab" style="color:#E8952C" onclick="switchSbTab('art1',this)">Art. 2</button>
      <button class="sb-tab" style="color:#4F8EF7" onclick="switchSbTab('art2',this)">Art. 3</button>
    </div>
    <div class="form-scroll" id="form-scroll">

      <!-- GLOBAL -->
      <div class="sb-section" id="sb-global">
        <div class="f-sec" style="margin-top:12px">
          <div class="f-sec-lbl" style="color:#565A5C">Session Info</div>
          <div class="f-2col">
            <div class="f-row"><label class="f-lbl">Session Date</label><input class="f-inp" id="f-date" placeholder="April 2026"></div>
            <div class="f-row"><label class="f-lbl">IG Handle</label><input class="f-inp" id="f-handle" placeholder="@AASPT_SIG"></div>
          </div>
        </div>
        <div class="f-sec">
          <div class="f-sec-lbl" style="color:#005F87">Expert Reviewer</div>
          <div class="f-row"><label class="f-lbl">Full Name</label><input class="f-inp" id="f-exp-name" placeholder="Erin Angelini"></div>
          <div class="f-row"><label class="f-lbl">Credentials</label><input class="f-inp" id="f-exp-creds" placeholder="PT, DPT, SCS, CPSS"></div>
          <div class="f-row"><label class="f-lbl">Role / Affiliation</label><input class="f-inp" id="f-exp-role" placeholder="Head Athletic Trainer · Orlando Pride, NWSL"></div>
          <div class="f-2col">
            <div class="f-row"><label class="f-lbl">Email</label><input class="f-inp" id="f-exp-email" placeholder="email@org.com"></div>
            <div class="f-row"><label class="f-lbl">Instagram</label><input class="f-inp" id="f-exp-ig" placeholder="@handle"></div>
          </div>
        </div>
        <div class="f-sec">

      <div class="s-rc-grid">
        ${rcCard('#1B6BB5',t.expLabel,'Expert Reviewer · All Articles',d.expName,`${d.expCreds} · ${d.expRole}`,d.expEmail,d.expIg,true)}
        ${rcCard(artC[0],artCT[0],artLabels[0],d.articles[0].rvName,d.articles[0].rvCreds,d.articles[0].rvEmail,d.articles[0].rvIg,false)}

/* ══════════════════════════════════════════════════════
   RENDER DISPATCH
   ══════════════════════════════════════════════════════ */
function renderSlide(tab,theme){
  const d=getData();
  const th=theme||currentTheme;
  if(tab==='cover')   return renderCover(d,th);
  if(tab==='a0')      return renderArticle(d,0,th);
  if(tab==='a1')      return renderArticle(d,1,th);
  if(tab==='a2')      return renderArticle(d,2,th);
  if(tab==='contact') return renderContact(d,th);
  return '';
}

/* ══════════════════════════════════════════════════════
   PREVIEW LOGIC
   ══════════════════════════════════════════════════════ */
function updatePreview(){
  document.getElementById('slide-wrap').innerHTML=renderSlide(currentTab);
  scaleSlide();
}
function scaleSlide(){
  const canvas=document.getElementById('preview-canvas');
  const wrap=document.getElementById('slide-wrap');
  const avail=canvas.clientWidth-48;
  const scale=Math.min(1,avail/1080);
  wrap.style.transform=`scale(${scale})`;
  wrap.style.transformOrigin='top center';
  wrap.style.marginBottom=(1350*scale-1350)+'px';
}
function showTab(tab){
  currentTab=tab;
  TABS.forEach(t=>{
    const pt=document.getElementById(`pt-${t}`);
    const snb=document.getElementById(`snb-${t}`);
    if(pt)  pt.classList.toggle('active',t===tab);
    if(snb) snb.classList.toggle('active-slide',t===tab);
  });
  updatePreview();
}
function switchSbTab(name,btn){
  document.querySelectorAll('.sb-section').forEach(s=>s.style.display='none');
  const sec=document.getElementById(`sb-${name}`);
  if(sec) sec.style.display='block';
  document.querySelectorAll('.sb-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('form-scroll').scrollTop=0;
}

/* ══════════════════════════════════════════════════════
   THEME TOGGLE
   ══════════════════════════════════════════════════════ */
function setTheme(th){
  currentTheme=th;
  document.getElementById('btn-light').classList.toggle('active',th==='light');
  document.getElementById('btn-dark').classList.toggle('active', th==='dark');
  updatePreview();
}

/* ══════════════════════════════════════════════════════
   EXPORT (html2canvas → PNG download)
   ══════════════════════════════════════════════════════ */
function showOverlay(msg){
  document.getElementById('export-msg').textContent=msg||'Rendering...';
  document.getElementById('export-overlay').classList.add('show');
}
function hideOverlay(){ document.getElementById('export-overlay').classList.remove('show'); }

function getFilename(tab){
  const d=getData();
  const date=(d.date||'JC').replace(/\s+/g,'-');
  const names={cover:'Cover',a0:'Slide1-RTR',a1:'Slide2-HipGroin',a2:'Slide3-ACL',contact:'Contact'};
  return `AASPT_${date}_${names[tab]||tab}_${currentTheme}.png`;
}

async function renderToCanvas(tab){
  const zone=document.getElementById('export-zone');
  zone.innerHTML=renderSlide(tab,currentTheme);
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  await new Promise(r=>setTimeout(r,600)); // let fonts load
  const el=zone.firstElementChild;
  return html2canvas(el,{
    scale:2,width:1080,height:1350,
    useCORS:true,allowTaint:true,
    backgroundColor:T[currentTheme].bg,
    logging:false,
  });
}

function canvasToBlob(canvas){
  return new Promise(res=>canvas.toBlob(res,'image/png'));
}
function downloadBlob(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a);
  a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

async function exportCurrent(){
  if(!window.html2canvas){alert('html2canvas not loaded — check your internet connection.');return;}
  showOverlay('Rendering slide...');
  try{
    const canvas=await renderToCanvas(currentTab);
    const blob=await canvasToBlob(canvas);
    downloadBlob(blob,getFilename(currentTab));
  }catch(e){console.error(e);alert('Export failed. Try opening in Chrome for best results.');}
  hideOverlay();
  document.getElementById('export-zone').innerHTML='';
}

async function exportAll(){
  if(!window.html2canvas){alert('html2canvas not loaded — check your internet connection.');return;}
  if(!window.JSZip){alert('JSZip not loaded — check your internet connection.');return;}
  const zip=new JSZip();
  for(const tab of TABS){
    showOverlay(`Rendering ${tab}... (${TABS.indexOf(tab)+1}/5)`);
    try{
      const canvas=await renderToCanvas(tab);
      const blob=await canvasToBlob(canvas);
      zip.file(getFilename(tab),blob);
    }catch(e){console.error('Error exporting',tab,e);}
    document.getElementById('export-zone').innerHTML='';
  }
  showOverlay('Creating ZIP...');
  const d=getData();
  const zipBlob=await zip.generateAsync({type:'blob'});
  const date=(d.date||'JC').replace(/\s+/g,'-');
  downloadBlob(zipBlob,`AASPT_${date}_${currentTheme}_Carousel.zip`);
  hideOverlay();
}

/* ══════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════ */
function init(){
  buildArticleForms();
  populateDefaults();
  document.getElementById('form-scroll').addEventListener('input',()=>{
    clearTimeout(window._db);
    window._db=setTimeout(updatePreview,200);
  });
  updatePreview();
  window.addEventListener('resize',scaleSlide);
}
init();
</script>
