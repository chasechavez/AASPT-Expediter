<!DOCTYPE html>
<!-- AASPT Journal Club — Slide Generator | Deploy: upload as index.html → GitHub Settings → Pages → main/root -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AASPT Journal Club — Slide Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Lora:ital,wght@1,400;1,600&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Barlow',sans-serif;background:#E4E3EB;color:#1A1A2E;overflow:hidden;}

/* ── NAV ── */
.top-nav{height:52px;background:#005F87;display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.25);z-index:100;position:relative;}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-logo-text{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:0.05em;}
.nav-sep{width:1px;height:22px;background:rgba(255,255,255,0.2);}
.nav-title{font-size:11px;color:rgba(255,255,255,0.55);letter-spacing:0.08em;text-transform:uppercase;}
.nav-controls{display:flex;align-items:center;gap:7px;}
.theme-toggle{display:flex;background:rgba(0,0,0,0.25);border-radius:5px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);}
.theme-btn{padding:5px 11px;font-size:9.5px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;border:none;cursor:pointer;transition:all .18s;font-family:'Barlow',sans-serif;color:rgba(255,255,255,0.45);background:transparent;}
.theme-btn.active{background:#fff;color:#005F87;}
.theme-btn:first-child{border-right:1px solid rgba(255,255,255,0.1);}
.nav-btn{padding:5px 13px;border-radius:4px;font-size:9.5px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;border:none;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .15s;}
.btn-one{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.22);}
.btn-one:hover{background:rgba(255,255,255,0.25);}
.btn-all{background:#fff;color:#005F87;}
.btn-all:hover{background:#E8F4FA;}

/* ── APP ── */
.app{display:flex;height:calc(100vh - 52px);}

/* ── SIDEBAR ── */
.sidebar{width:385px;flex-shrink:0;background:#fff;border-right:1px solid #DDDBE6;display:flex;flex-direction:column;overflow:hidden;}
.sb-head{background:#004E72;padding:11px 17px 9px;flex-shrink:0;}
.sb-head-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:0.04em;}
.sb-head-sub{font-size:8.5px;color:rgba(255,255,255,0.4);margin-top:2px;}
.sb-tabs{display:flex;border-bottom:1px solid #ECEAEF;flex-shrink:0;background:#F8F8FB;}
.sb-tab{flex:1;padding:7px 3px;font-size:9px;font-weight:600;text-align:center;cursor:pointer;color:#8A8FA0;border:none;background:transparent;letter-spacing:0.05em;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .15s;font-family:'Barlow',sans-serif;}
.sb-tab:hover{color:#005F87;}
.sb-tab.active{color:#005F87;border-bottom-color:#005F87;background:#fff;}
.form-scroll{flex:1;overflow-y:auto;padding:12px 15px 0;}

/* Form */
.f-sec{margin-bottom:14px;}
.f-sec-lbl{font-size:8px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;border-bottom:1px solid #EEEDF2;padding-bottom:4px;margin-bottom:9px;}
.f-row{margin-bottom:5px;}
.f-lbl{font-size:9px;color:#565A5C;font-weight:600;margin-bottom:2px;display:block;}
.f-inp{width:100%;border:1px solid #D8D5D0;border-radius:4px;padding:5px 7px;font-size:10.5px;font-family:'Barlow',sans-serif;color:#1A1A1A;background:#FAFAFA;line-height:1.35;transition:border .15s;}
.f-inp:focus{outline:none;border-color:#005F87;background:#fff;}
textarea.f-inp{resize:vertical;min-height:34px;}
.f-sel{width:100%;border:1px solid #D8D5D0;border-radius:4px;padding:5px 7px;font-size:10.5px;font-family:'Barlow',sans-serif;color:#1A1A1A;background:#FAFAFA;cursor:pointer;}
.f-sel:focus{outline:none;border-color:#005F87;}
.f-2col{display:flex;gap:5px;}
.f-2col .f-row{flex:1;margin-bottom:0;}

/* Photo upload */
.photo-row{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.photo-thumb{width:42px;height:42px;border-radius:50%;background:#EEE center/cover;border:2px solid #D8D5D0;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#AAA;font-family:'Barlow Condensed',sans-serif;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-controls{display:flex;flex-direction:column;gap:3px;}
.f-file-lbl{display:inline-block;padding:3px 9px;background:#E5F0F8;color:#005F87;border-radius:3px;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:0.05em;}
.f-file-lbl:hover{background:#CCDEF0;}
.f-file-inp{display:none;}
.f-clear{font-size:8.5px;color:#CCC;cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'Barlow',sans-serif;}
.f-clear:hover{color:#999;}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.logo-thumb{width:42px;height:28px;border:1px solid #D8D5D0;border-radius:3px;background:#F5F5F5 center/contain no-repeat;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:8px;color:#CCC;}

/* Pearls */
.p-block{border:1px solid #EEEDF2;border-radius:5px;padding:7px 9px;margin-bottom:5px;background:#FAFAFA;}
.p-num{font-size:7px;font-weight:700;color:#B0AEC0;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;}
.p-top{display:flex;gap:4px;margin-bottom:3px;}
.p-cat-sel{width:90px;flex-shrink:0;border:1px solid #D8D5D0;border-radius:3px;padding:3px 4px;font-size:9px;font-family:'Barlow',sans-serif;color:#1A1A1A;background:#fff;cursor:pointer;}
.p-cat-sel.c-assess{border-color:#3B82F6;color:#1D4ED8;}
.p-cat-sel.c-intervene{border-color:#B45309;color:#92400E;}
.p-cat-sel.c-outcome{border-color:#059669;color:#065F46;}
.p-anchor{flex:1;border:1px solid #D8D5D0;border-radius:3px;padding:3px 6px;font-size:10px;font-family:'Barlow',sans-serif;font-weight:600;background:#fff;}
.p-anchor:focus{outline:none;border-color:#005F87;}
.p-body{width:100%;border:1px solid #D8D5D0;border-radius:3px;padding:3px 6px;font-size:10px;font-family:'Barlow',sans-serif;background:#fff;resize:vertical;min-height:28px;line-height:1.3;}
.p-body:focus{outline:none;border-color:#005F87;}

/* Export bar */
.exp-bar{display:flex;gap:4px;padding:8px 13px;border-top:1px solid #ECEAEF;background:#F8F8FB;flex-shrink:0;flex-wrap:wrap;align-items:center;}
.exp-bar-lbl{font-size:8px;color:#8A8FA0;text-transform:uppercase;letter-spacing:0.1em;margin-right:2px;}
.sb-nav-btn{border:none;border-radius:3px;padding:4px 9px;font-size:8.5px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;letter-spacing:0.05em;background:#E5F0F8;color:#005F87;transition:all .15s;}
.sb-nav-btn:hover{background:#CCDEF0;}
.sb-nav-btn.active-slide{background:#005F87;color:#fff;}

/* ── PREVIEW ── */
.preview-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#1A1A2E;min-width:0;}
.preview-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.07);background:#13132A;flex-shrink:0;padding:0 14px;}
.ptab{padding:9px 13px;font-size:9px;font-weight:600;cursor:pointer;color:#444;border:none;background:transparent;letter-spacing:0.06em;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .15s;font-family:'Barlow',sans-serif;}
.ptab:hover{color:#777;}
.ptab.active{color:#fff;border-bottom-color:#fff;}
.preview-canvas{flex:1;overflow:auto;display:flex;justify-content:center;padding:20px;}
.slide-wrap{transform-origin:top center;display:inline-block;line-height:0;}

/* Export overlay */
.exp-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.exp-overlay.show{display:flex;}
.exp-spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
.exp-msg{color:#fff;font-size:12px;letter-spacing:0.08em;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Hidden export zone */
#export-zone{position:fixed;left:-2200px;top:0;width:1080px;pointer-events:none;z-index:-1;}

/* ══════════════════════════
   SLIDE BASE STYLES
   ══════════════════════════ */
.slide{width:1080px;height:1350px;position:relative;overflow:hidden;font-family:'Barlow',sans-serif;display:flex;flex-direction:column;}
.s-texture{position:absolute;inset:0;background-image:radial-gradient(currentColor 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:1;}
.s-glow{position:absolute;right:-80px;top:140px;width:500px;height:500px;border-radius:50%;pointer-events:none;z-index:1;}
.s-accent{position:absolute;top:0;left:0;right:0;height:5px;z-index:10;}
.s-bgnum{position:absolute;right:18px;top:50px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:370px;line-height:1;z-index:2;user-select:none;letter-spacing:-0.05em;pointer-events:none;}
.s-body{position:relative;z-index:5;padding:46px 66px 38px;height:100%;display:flex;flex-direction:column;}
.s-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.s-logo-wrap{display:flex;align-items:center;gap:9px;}
.s-logo-icon{width:38px;height:38px;}
.s-logo-aaspt{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;letter-spacing:0.05em;line-height:1;}
.s-logo-tag{font-size:7px;letter-spacing:0.09em;text-transform:uppercase;font-weight:500;margin-top:2px;}
.s-hdr-jc{font-family:'Space Mono',monospace;font-size:8.5px;text-transform:uppercase;letter-spacing:0.1em;line-height:1.8;text-align:right;}
.s-hdr-ep{font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:0.08em;text-align:right;}
.s-cat{font-family:'Space Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.s-cat-left{display:flex;align-items:center;gap:8px;}
.s-cat-rule{display:block;width:18px;height:2px;border-radius:2px;flex-shrink:0;}
.s-study-badge{font-family:'Space Mono',monospace;font-size:6.5px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.s-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:44px;line-height:1.06;letter-spacing:-0.01em;margin-bottom:16px;position:relative;z-index:3;}
.s-rvstrip{display:flex;align-items:center;gap:20px;padding:11px 15px;border-radius:5px;margin-bottom:18px;}
.s-rvblock{display:flex;align-items:center;gap:10px;}
.s-rv-photo{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.s-rv-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.s-rvtext{display:flex;flex-direction:column;gap:1px;}
.s-rv-role{font-family:'Space Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:0.12em;}
.s-rv-name{font-size:13.5px;font-weight:600;line-height:1.2;}
.s-rv-creds{font-size:10px;}
.s-rvdiv{width:1px;align-self:stretch;flex-shrink:0;}
.s-rv-logo{height:22px;width:auto;max-width:70px;object-fit:contain;display:block;}
.s-sec-lbl{font-family:'Space Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:0.18em;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.s-sec-lbl::after{content:'';flex:1;height:1px;}
.s-bl-wrap{margin-bottom:16px;}
.s-bl-text{font-size:15px;font-weight:500;line-height:1.52;padding-left:14px;border-left:3px solid;font-style:italic;}
.s-pearls{flex:1;display:flex;flex-direction:column;gap:7px;margin-bottom:18px;}
.s-pearl{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border-radius:5px;}
.s-badge{font-family:'Space Mono',monospace;font-size:6.5px;letter-spacing:0.09em;text-transform:uppercase;padding:3px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:2px;border:1px solid;}
.s-pearl-text{font-size:12.5px;line-height:1.5;}
.s-pearl-text strong{font-weight:600;}
.s-footer{padding-top:11px;display:flex;flex-direction:column;gap:5px;}
.s-cite{font-family:'Space Mono',monospace;font-size:7.5px;font-style:italic;line-height:1.55;}
.s-foot-row{display:flex;justify-content:space-between;align-items:center;}
.s-tags{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:0.04em;}
.s-handle{font-family:'Space Mono',monospace;font-size:7.5px;}

/* Cover */
.s-cov-eyebrow{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:12px;}
.s-cov-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:90px;line-height:0.92;letter-spacing:-0.02em;text-transform:uppercase;margin-bottom:14px;padding-bottom:6px;}
.s-cov-sub{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:38px;letter-spacing:0.03em;text-transform:uppercase;margin-bottom:16px;}
.s-cov-meta{font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:0.1em;}
.s-exp-banner{padding:14px 18px;border-radius:6px;margin-top:18px;display:flex;align-items:center;gap:16px;}
.s-exp-photo{width:66px;height:66px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.s-exp-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.s-exp-info{flex:1;}
.s-exp-lbl{font-family:'Space Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:0.16em;margin-bottom:4px;}
.s-exp-name{font-size:16px;font-weight:700;line-height:1.2;}
.s-exp-creds{font-size:10.5px;margin-top:1px;}
.s-exp-logo{height:28px;width:auto;max-width:90px;object-fit:contain;display:block;flex-shrink:0;}
.s-art-cards{display:flex;flex-direction:column;gap:7px;margin-top:16px;}
.s-art-card{display:flex;align-items:center;gap:12px;padding:11px 15px;border-radius:5px;border-left:3px solid;}
.s-card-photo{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.s-card-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.s-card-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px;opacity:0.2;min-width:28px;line-height:1;flex-shrink:0;}
.s-card-info{flex:1;}
.s-card-title{font-size:11.5px;font-weight:600;line-height:1.25;margin-bottom:2px;}
.s-card-rv{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:0.03em;}
.s-card-logo{height:20px;width:auto;max-width:60px;object-fit:contain;display:block;flex-shrink:0;}

/* Contact */
.s-contact-head{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:52px;text-transform:uppercase;letter-spacing:-0.01em;line-height:1;margin-bottom:4px;}
.s-contact-sub{font-size:11.5px;margin-bottom:18px;}
.s-rc-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px;}
.s-rc-card{padding:13px 15px;border-radius:5px;border-top:2px solid;}
.s-rc-card-inner{display:flex;align-items:flex-start;gap:10px;}
.s-rc-photo{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.s-rc-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.s-rc-info{flex:1;}
.s-rc-tag{font-family:'Space Mono',monospace;font-size:6.5px;text-transform:uppercase;letter-spacing:0.14em;margin-bottom:2px;}
.s-rc-name{font-size:13px;font-weight:700;}
.s-rc-creds{font-size:9.5px;margin-bottom:6px;}
.s-rc-contacts{display:flex;flex-direction:column;gap:3px;}
.s-rc-row{display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:8px;}
.s-rc-logo{height:18px;width:auto;max-width:55px;object-fit:contain;margin-top:4px;display:block;}
.s-citations-block{border-radius:5px;padding:12px 15px;margin-bottom:11px;}
.s-cit-label{font-family:'Space Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:0.16em;margin-bottom:8px;}
.s-cit-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.s-cit-item:last-child{margin-bottom:0;}
.s-cit-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.s-cit-text{font-family:'Space Mono',monospace;font-size:7px;line-height:1.55;font-style:italic;}
.s-ann-box{border-radius:5px;padding:13px 18px;margin-bottom:13px;}
.s-ann-tag{font-family:'Space Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:0.16em;margin-bottom:7px;}
.s-ann-when{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;}
.s-ann-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;line-height:1.1;}
.s-ann-note{font-family:'Space Mono',monospace;font-size:8px;margin-top:7px;}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand">
    <svg width="30" height="30" viewBox="0 0 44 44" fill="none"><path d="M7 36L22 9L37 36Z" fill="none" stroke="#fff" stroke-width="2.4" stroke-linejoin="round"/><path d="M15 36L25 18L37 36Z" fill="#fff" opacity="0.3"/><circle cx="31" cy="11" r="2.8" fill="#fff"/><path d="M29.5 14L27 21M29.5 14L33 19.5M27 21L24.5 26.5M27 21L30 26" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>
    <div class="nav-sep"></div>
    <span class="nav-logo-text">AASPT</span>
    <div class="nav-sep"></div>
    <span class="nav-title">Journal Club · Slide Generator</span>
  </div>
  <div class="nav-controls">
    <div class="theme-toggle">
      <button class="theme-btn" id="btn-light" onclick="setTheme('light')">☀ Light</button>
      <button class="theme-btn active" id="btn-dark" onclick="setTheme('dark')">🌙 Dark</button>
    </div>
    <button class="nav-btn btn-one" onclick="exportCurrent()">⬇ Export Slide</button>
    <button class="nav-btn btn-all" onclick="exportAll()">⬇ Export All (ZIP)</button>
  </div>
</nav>

<div class="app">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-head-title">Journal Club Form</div>
      <div class="sb-head-sub">Fill in once per session — preview updates live</div>
    </div>
    <div class="sb-tabs">
      <button class="sb-tab active" onclick="switchSbTab('global',this)">Global</button>
      <button class="sb-tab" style="color:#00B4A0" onclick="switchSbTab('art0',this)">Art. 1</button>
      <button class="sb-tab" style="color:#E8952C" onclick="switchSbTab('art1',this)">Art. 2</button>
      <button class="sb-tab" style="color:#4F8EF7" onclick="switchSbTab('art2',this)">Art. 3</button>
    </div>
    <div class="form-scroll" id="form-scroll">

      <div class="sb-section" id="sb-global">
        <div class="f-sec" style="margin-top:11px">
          <div class="f-sec-lbl" style="color:#565A5C">Session Info</div>
          <div class="f-2col">
            <div class="f-row"><label class="f-lbl">Session Date</label><input class="f-inp" id="f-date" placeholder="April 2026"></div>
            <div class="f-row"><label class="f-lbl">IG Handle</label><input class="f-inp" id="f-handle" placeholder="@AASPT_SIG"></div>
          </div>
        </div>
        <div class="f-sec">
          <div class="f-sec-lbl" style="color:#005F87">Expert Reviewer</div>
          <div class="f-row"><label class="f-lbl">Full Name</label><input class="f-inp" id="f-exp-name" placeholder="Erin Angelini"></div>
          <div class="f-row"><label class="f-lbl">Credentials</label><input class="f-inp" id="f-exp-creds" placeholder="PT, DPT, SCS, CPSS"></div>

/* ── IMAGE UPLOAD ── */
function uploadImg(input,hiddenId,thumbId,maxPx,isCircle){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const r=Math.min(maxPx/img.width,maxPx/img.height,1);
      canvas.width=Math.round(img.width*r);
      canvas.height=Math.round(img.height*r);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      const data=canvas.toDataURL('image/jpeg',0.9);
      document.getElementById(hiddenId).value=data;
      const th=document.getElementById(thumbId);
      if(isCircle){
        th.innerHTML=`<img src="${data}" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:50%">`;
      } else {
        th.style.backgroundImage=`url(${data})`;
        th.innerHTML='';
      }
      updatePreview();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearImg(hiddenId,thumbId,initials){
  document.getElementById(hiddenId).value='';
  const th=document.getElementById(thumbId);
  th.style.backgroundImage='none';
  th.innerHTML=initials?`<span>${initials}</span>`:'logo';
  updatePreview();
}

    <path d="M29.5 14L27 21M29.5 14L33 19.5M27 21L24.5 26.5M27 21L30 26" stroke="#1B6BB5" stroke-width="1.6" stroke-linecap="round"/>
  </svg>`;
}
function envIcon(c){return `<svg width="11" height="11" viewBox="0 0 13 13" fill="none"><rect x=".5" y="2.5" width="12" height="8" rx="1" stroke="${c}" stroke-width="1.1"/><path d="M.5 3.5l6 4 6-4" stroke="${c}" stroke-width="1.1"/></svg>`;}
function igIcon(c) {return `<svg width="11" height="11" viewBox="0 0 13 13" fill="none"><rect x="1.5" y="1.5" width="10" height="10" rx="2.5" stroke="${c}" stroke-width="1.1"/><circle cx="6.5" cy="6.5" r="2.2" stroke="${c}" stroke-width="1.1"/><circle cx="9.5" cy="3.5" r=".8" fill="${c}"/></svg>`;}

function photoCircle(src,name,size,accentC,borderC){
  const bc=borderC||accentC;
  if(src){
    return `<div style="width:${size}px;height:${size}px;border-radius:50%;overflow:hidden;border:2.5px solid ${bc};flex-shrink:0;background:#333">
      <img src="${src}" style="width:100%;height:100%;object-fit:cover;display:block">
    </div>`;
  }
  const init=(name||'?').split(' ').filter(Boolean).map(n=>n[0]).join('').toUpperCase().slice(0,2);
  const fs=Math.round(size/3);
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;border:2px dashed ${bc};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:700;color:${bc};font-family:'Barlow Condensed',sans-serif;opacity:0.45">${init}</div>`;
}
function logoImg(src,h){
  if(!src)return '';
  return `<img src="${src}" style="height:${h}px;width:auto;max-width:${h*3.5}px;object-fit:contain;display:block;flex-shrink:0">`;
}

function hdrHTML(d,t,epLabel,epColor){
  return `<div class="s-header">
    <div class="s-logo-wrap">${logoSVG(t.logoTxt)}
      <div><div class="s-logo-aaspt" style="color:${t.logoTxt}">AASPT</div>
      <div class="s-logo-tag" style="color:${t.logoTag}">Building Leaders in Sports PT</div></div>
    </div>
    <div style="text-align:right;flex-shrink:0;min-width:0;max-width:260px;">
      <div class="s-hdr-jc" style="color:${t.hdrJc};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Journal Club · ${d.date}</div>
      <div class="s-hdr-ep" style="color:${epColor||t.muted};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${epLabel}</div>
    </div>
  </div>`;
}
function badgeHTML(cat,i,t){
  if(cat==='ASSESS')  return `<span class="s-badge" style="background:${t.assess.bg};color:${t.assess.text};border-color:${t.assess.border}">Assess</span>`;
  if(cat==='OUTCOME') return `<span class="s-badge" style="background:${t.outcome.bg};color:${t.outcome.text};border-color:${t.outcome.border}">Outcome</span>`;
  return `<span class="s-badge" style="background:${t.artCL[i]};color:${t.artCT[i]};border-color:${t.artCB[i]}">Intervene</span>`;
}
function pearlsHTML(pearls,i,t){
  if(!pearls.length) return `<div style="color:${t.muted};font-size:11px;font-style:italic;padding:6px 0">Enter pearls in the sidebar...</div>`;
  return pearls.map(p=>`<div class="s-pearl" style="background:${t.surfLow};border:1px solid ${t.border}">
    ${badgeHTML(p.cat,i,t)}
    <div class="s-pearl-text" style="color:${t.prlTxt}"><strong style="color:${t.prlStr}">${p.anchor}</strong>${p.body?' '+p.body:''}</div>

}

/* ── CONTACT ── */
function renderContact(d,theme){
  const t=T[theme];

    const wr=wide?'grid-column:1/-1':'' ;

      ${hdrHTML(d,t,'Reviewers &amp; Citations',t.muted)}

}

/* ── RENDER DISPATCH ── */
function renderSlide(tab,theme){
  const d=getData(),th=theme||currentTheme;
  if(tab==='cover')   return renderCover(d,th);
  if(tab==='a0')      return renderArticle(d,0,th);
  if(tab==='a1')      return renderArticle(d,1,th);
  if(tab==='a2')      return renderArticle(d,2,th);
  if(tab==='contact') return renderContact(d,th);
  return '';
}

/* ── PREVIEW ── */
function updatePreview(){
  document.getElementById('slide-wrap').innerHTML=renderSlide(currentTab);
  scaleSlide();
}
function scaleSlide(){
  const canvas=document.getElementById('preview-canvas');
  const wrap=document.getElementById('slide-wrap');
  const avail=canvas.clientWidth-40;
  const scale=Math.min(1,avail/1080);
  wrap.style.transform=`scale(${scale})`;
  wrap.style.transformOrigin='top center';
  wrap.style.marginBottom=(1350*scale-1350)+'px';
}
function showTab(tab){
  currentTab=tab;
  TABS.forEach(t=>{
    const pt=document.getElementById(`pt-${t}`);
    const sb=document.getElementById(`snb-${t}`);
    if(pt)  pt.classList.toggle('active',t===tab);
    if(sb)  sb.classList.toggle('active-slide',t===tab);
  });
  updatePreview();
}
function switchSbTab(name,btn){
  document.querySelectorAll('.sb-section').forEach(s=>s.style.display='none');
  const sec=document.getElementById(`sb-${name}`);
  if(sec) sec.style.display='block';
  document.querySelectorAll('.sb-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('form-scroll').scrollTop=0;
}
function setTheme(th){
  currentTheme=th;
  document.getElementById('btn-light').classList.toggle('active',th==='light');
  document.getElementById('btn-dark').classList.toggle('active',th==='dark');
  updatePreview();
}

/* ── EXPORT ── */
function showOv(msg){document.getElementById('exp-msg').textContent=msg||'Rendering...';document.getElementById('exp-overlay').classList.add('show');}
function hideOv(){document.getElementById('exp-overlay').classList.remove('show');}
function fname(tab){
  const d=getData();
  const date=(d.date||'JC').replace(/\s+/g,'-');
  const names={cover:'Cover',a0:'Slide1',a1:'Slide2',a2:'Slide3',contact:'Contact'};
  return `AASPT_${date}_${names[tab]||tab}_${currentTheme}.png`;
}
async function renderToCanvas(tab){
  const zone=document.getElementById('export-zone');
  zone.innerHTML=renderSlide(tab,currentTheme);
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  await new Promise(r=>setTimeout(r,700));
  const el=zone.firstElementChild;
  return html2canvas(el,{scale:2,width:1080,height:1350,useCORS:true,allowTaint:true,backgroundColor:T[currentTheme].bg,logging:false});
}
function toBlob(canvas){return new Promise(r=>canvas.toBlob(r,'image/png'));}
function dlBlob(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=name;document.body.appendChild(a);a.click();
  document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);
}
async function exportCurrent(){
  if(!window.html2canvas){alert('html2canvas not loaded — check internet connection.');return;}
  showOv('Rendering slide...');
  try{const canvas=await renderToCanvas(currentTab);dlBlob(await toBlob(canvas),fname(currentTab));}
  catch(e){console.error(e);alert('Export failed. Use Chrome for best results.');}
  hideOv();document.getElementById('export-zone').innerHTML='';
}
async function exportAll(){
  if(!window.html2canvas||!window.JSZip){alert('Libraries not loaded — check internet connection.');return;}
  const zip=new JSZip();
  for(const tab of TABS){
    showOv(`Rendering ${tab}... (${TABS.indexOf(tab)+1}/5)`);
    try{const canvas=await renderToCanvas(tab);zip.file(fname(tab),await toBlob(canvas));}
    catch(e){console.error('Error:',tab,e);}
    document.getElementById('export-zone').innerHTML='';
  }
  showOv('Creating ZIP...');
  const d=getData();
  dlBlob(await zip.generateAsync({type:'blob'}),`AASPT_${(d.date||'JC').replace(/\s+/g,'-')}_${currentTheme}_Carousel.zip`);
  hideOv();
}

/* ── INIT ── */
function init(){
  buildArticleForms();
  populateDefaults();
  document.getElementById('form-scroll').addEventListener('input',()=>{
    clearTimeout(window._db);window._db=setTimeout(updatePreview,220);
  });
  updatePreview();
  window.addEventListener('resize',scaleSlide);
}
init();
</script>
